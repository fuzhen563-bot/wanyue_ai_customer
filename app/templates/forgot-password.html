<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>找回密码 - 万岳AI客服</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --error: #f87171;
            --success: #34d399;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 50%, #1e1b4b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 70%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 70% 30%, rgba(59, 130, 246, 0.15) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-2%, 2%); }
        }
        
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }
        
        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
        }
        
        .logo-text {
            font-size: 26px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.5px;
        }
        
        .title {
            text-align: center;
            margin-bottom: 32px;
            color: var(--text);
            font-size: 20px;
            font-weight: 600;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
        }
        
        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text);
            font-size: 15px;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.12);
        }
        
        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        
        .input-group {
            display: flex;
            gap: 10px;
        }
        
        .input-group .form-input {
            flex: 1;
        }
        
        .btn {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        
        .error {
            background: rgba(248, 113, 113, 0.15);
            border: 1px solid rgba(248, 113, 113, 0.3);
            color: var(--error);
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        .error.show { display: block; }
        
        .success {
            background: rgba(52, 211, 153, 0.15);
            border: 1px solid rgba(52, 211, 153, 0.3);
            color: var(--success);
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        .success.show { display: block; }
        
        .footer {
            text-align: center;
            margin-top: 24px;
            color: var(--text-muted);
            font-size: 14px;
        }
        
        .footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
        
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="glass">
        <div class="logo">
            <div class="logo-icon">
                <i class="fas fa-robot"></i>
            </div>
            <div class="logo-text">万岳AI客服</div>
        </div>
        
        <h1 class="title" id="pageTitle">找回密码</h1>
        
        <div class="error" id="errorMsg"></div>
        <div class="success" id="successMsg"></div>
        
        <!-- Step 1: Input Email -->
        <div id="step1">
            <div class="form-group">
                <label class="form-label">注册邮箱</label>
                <input type="email" class="form-input" id="resetEmail" placeholder="请输入注册邮箱" required>
            </div>
            <button class="btn" onclick="sendResetCode()">发送验证码</button>
        </div>
        
        <!-- Step 2: Input Code and New Password -->
        <div id="step2" class="hidden">
            <div class="form-group">
                <label class="form-label">验证码</label>
                <input type="text" class="form-input" id="resetCode" placeholder="6位验证码" maxlength="6" required>
            </div>
            <div class="form-group">
                <label class="form-label">新密码</label>
                <input type="password" class="form-input" id="newPassword" placeholder="设置新密码" required>
            </div>
            <div class="form-group">
                <label class="form-label">确认密码</label>
                <input type="password" class="form-input" id="confirmPassword" placeholder="再次输入新密码" required>
            </div>
            <button class="btn" onclick="resetPassword()">重置密码</button>
        </div>
        
        <div class="footer">
            <a href="/login">返回登录</a>
        </div>
    </div>
    
    <script>
        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.add('show');
            document.getElementById('successMsg').classList.remove('show');
        }
        
        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.textContent = msg;
            el.classList.add('show');
            document.getElementById('errorMsg').classList.remove('show');
        }
        
        function hideMessages() {
            document.getElementById('errorMsg').classList.remove('show');
            document.getElementById('successMsg').classList.remove('show');
        }
        
        let countdown = 0;
        
        async function sendResetCode() {
            hideMessages();
            const email = document.getElementById('resetEmail').value;
            const btn = event.target;
            
            if (!email || !email.includes('@')) {
                showError('请输入有效的邮箱地址');
                return;
            }
            
            btn.disabled = true;
            btn.textContent = '发送中...';
            
            try {
                const res = await fetch('/api/membership/send-reset-code?email=' + encodeURIComponent(email), {
                    method: 'POST'
                });
                const data = await res.json();
                
                if (res.ok) {
                    showSuccess('验证码已发送到您的邮箱');
                    document.getElementById('step1').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');
                    document.getElementById('pageTitle').textContent = '设置新密码';
                    
                    countdown = 60;
                    btn.textContent = countdown + 's';
                    const timer = setInterval(() => {
                        countdown--;
                        btn.textContent = countdown + 's';
                        if (countdown <= 0) {
                            clearInterval(timer);
                            btn.disabled = false;
                            btn.textContent = '重新发送';
                        }
                    }, 1000);
                } else {
                    showError(data.detail || '发送失败');
                    btn.disabled = false;
                    btn.textContent = '发送验证码';
                }
            } catch (err) {
                showError('网络错误');
                btn.disabled = false;
                btn.textContent = '发送验证码';
            }
        }
        
        async function resetPassword() {
            hideMessages();
            const email = document.getElementById('resetEmail').value;
            const code = document.getElementById('resetCode').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (!code || code.length !== 6) {
                showError('请输入6位验证码');
                return;
            }
            
            if (!newPassword || newPassword.length < 6) {
                showError('密码长度至少6位');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                showError('两次输入的密码不一致');
                return;
            }
            
            try {
                const params = new URLSearchParams({
                    email: email,
                    code: code,
                    new_password: newPassword
                });
                const res = await fetch('/api/membership/reset-password?' + params.toString(), {
                    method: 'POST'
                });
                const data = await res.json();
                
                if (res.ok) {
                    showSuccess('密码重置成功！');
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 1500);
                } else {
                    showError(data.detail || '重置失败');
                }
            } catch (err) {
                showError('网络错误');
            }
        }
    </script>
</body>
</html>
