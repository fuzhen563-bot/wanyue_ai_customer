<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth登录处理中...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 90%;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error { color: #dc2626; }
        .success { color: #10b981; }
        
        .choice-container { display: none; }
        .choice-container.show { display: block; }
        .choice-container h2 {
            margin-bottom: 8px;
            color: #1f2937;
        }
        .choice-container p {
            color: #6b7280;
            margin-bottom: 24px;
        }
        .choice-btn {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .choice-btn button {
            padding: 16px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .choice-btn .admin-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .choice-btn .admin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .choice-btn .user-btn {
            background: #f3f4f6;
            color: #374151;
            border: 2px solid #e5e7eb;
        }
        .choice-btn .user-btn:hover {
            background: #e5e7eb;
        }
        .choice-btn i { font-size: 20px; }
        
        .spinner-container { display: block; }
        .spinner-container.hidden { display: none; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="spinner-container" id="spinnerContainer">
            <div class="spinner"></div>
            <p id="message">正在处理登录，请稍候...</p>
        </div>
        
        <div class="choice-container" id="choiceContainer">
            <h2>登录成功</h2>
            <p>请选择您要进入的页面</p>
            <div class="choice-btn">
                <button class="admin-btn" onclick="goToAdmin()">
                    <i class="fas fa-cogs"></i>
                    管理后台
                </button>
                <button class="user-btn" onclick="goToUser()">
                    <i class="fas fa-user"></i>
                    用户中心
                </button>
            </div>
        </div>
    </div>
    <script>
        let userRole = 'user';
        
        function goToAdmin() {
            window.location.href = '/admin';
        }
        
        function goToUser() {
            window.location.href = '/user';
        }
        
        async function handleOAuthCallback() {
            const params = new URLSearchParams(window.location.search);
            let platform = params.get('platform');
            const code = params.get('code');
            const state = params.get('state');
            let bind_user_id = params.get('bind_user_id');
            
            if (!platform) {
                platform = localStorage.getItem('oauth_platform');
            }
            
            if (!bind_user_id) {
                bind_user_id = localStorage.getItem('oauth_bind_user_id');
            }
            
            if (!platform) {
                platform = 'custom';
            }
            
            if (!code) {
                document.getElementById('message').textContent = '参数错误: 缺少授权码';
                document.getElementById('message').className = 'error';
                return;
            }
            
            document.getElementById('message').textContent = '正在处理登录...';
            
            let callbackUrl = `/api/oauth/callback/${platform}?code=${code}&state=${state || ''}`;
            if (bind_user_id) {
                callbackUrl += '&bind_user_id=' + bind_user_id;
            }
            
            try {
                const res = await fetch(callbackUrl);
                const data = await res.json();
                
                localStorage.removeItem('oauth_platform');
                localStorage.removeItem('oauth_bind_user_id');
                
                if (data.access_token) {
                    localStorage.setItem('token', data.access_token);
                    userRole = data.user?.role || 'user';
                    localStorage.setItem('userRole', userRole);
                    
                    document.getElementById('spinnerContainer').classList.add('hidden');
                    document.getElementById('choiceContainer').classList.add('show');
                } else if (data.binded === false) {
                    const bindData = {
                        platform: data.platform,
                        openid: data.openid,
                        nickname: data.nickname,
                        avatar: data.avatar,
                        email: data.email
                    };
                    sessionStorage.setItem('oauth_bind_data', JSON.stringify(bindData));
                    window.location.href = '/login?oauth_bind=1';
                } else {
                    document.getElementById('message').textContent = data.error || '登录失败';
                    document.getElementById('message').className = 'error';
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                }
            } catch (err) {
                document.getElementById('message').textContent = '网络错误';
                document.getElementById('message').className = 'error';
            }
        }
        
        handleOAuthCallback();
    </script>
</body>
</html>
